name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  build-cpp:
    name: Build C++ Project
    if: >-
      github.event_name == 'pull_request'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check src changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            src:
              - 'src/**'
              - 'CMakeLists.txt'
              - 'tests/**'

      - name: Configure CMake
        if: steps.changes.outputs.src == 'true'
        run: cmake -B build -A x64 -DCMAKE_BUILD_TYPE=Release

      - name: Build
        if: steps.changes.outputs.src == 'true'
        run: cmake --build build --config Release --parallel

      - name: Upload build artifacts
        if: steps.changes.outputs.src == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tenbox-build
          path: build/Release/*.exe

      - name: Skip notice
        if: steps.changes.outputs.src != 'true'
        run: echo "No changes in src/, skipping C++ build."

  build-website:
    name: Build Website
    if: >-
      github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check website changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            website:
              - 'website/**'

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.website == 'true'
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.changes.outputs.website == 'true'
        run: npm install
        working-directory: website

      - name: Build
        if: steps.changes.outputs.website == 'true'
        run: npm run build
        working-directory: website

      - name: Skip notice
        if: steps.changes.outputs.website != 'true'
        run: echo "No changes in website/, skipping website build."
